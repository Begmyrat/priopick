events {
    worker_connections 1024;
}

http {
    # Rate limit — 10 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream auth_service {
        server auth-service:8000;
    }
    upstream vendor_service {
        server vendor-service:8000;
    }
    upstream planner_service {
        server planner-service:8000;
    }
    upstream analytics_service {
        server analytics-service:8000;
    }

    server {
        listen 80;

        # Auth routes
        location /api/v1/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Vendor routes
        location /api/v1/vendors/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://vendor_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Planner routes
        location /api/v1/plans/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://planner_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Analytics routes
        location /api/v1/analytics/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://analytics_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}